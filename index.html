<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeToon Finder</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    background: #1e293b;
    padding: 2rem;
    border-radius: 1.5rem;
    width: 90%;
    max-width: 400px;
    text-align: center;
}
input, button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 10px;
}
button { background: #2563eb; color: white; border: none; }
#status { margin-top: 10px; color: #94a3b8; }
</style>
</head>

<body>

<div class="container">
    <h2>AnimeToon Finder</h2>
    <input type="text" id="animeInput" placeholder="Enter Anime Name">
    <button id="searchBtn">Find Hindi Dub</button>
    <div id="status">Ready...</div>
</div>

<script>
const searchBtn = document.getElementById('searchBtn');
const status = document.getElementById('status');
const animeInput = document.getElementById('animeInput');

// 🔥 CHANGE THIS
const WORKER_URL = "https://your-worker.workers.dev";
const API_KEY = "yasin123";

async function fetchHtml(url) {
    const proxyUrl = WORKER_URL + "/?url=" + encodeURIComponent(url) + "&key=" + API_KEY;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error("Proxy error");
    return await res.text();
}

function extractTrid(html) {
    let match =
        html.match(/trid=(\d+)/) ||
        html.match(/trid["']?\s*[:=]\s*["']?(\d+)/) ||
        html.match(/data-trid=["'](\d+)/);

    return match ? match[1] : null;
}

searchBtn.addEventListener('click', async () => {

    const query = animeInput.value.trim();
    if (!query) return;

    status.innerHTML = "🔍 Searching...";
    searchBtn.disabled = true;

    try {
        const searchHtml = await fetchHtml(`https://toonstream.dad/home/?s=${query}`);

        const doc = new DOMParser().parseFromString(searchHtml, "text/html");

        const firstResult =
            doc.querySelector(".result-item a") ||
            doc.querySelector("article a") ||
            doc.querySelector(".post-title a");

        if (!firstResult) {
            status.innerHTML = "❌ Not found";
            searchBtn.disabled = false;
            return;
        }

        status.innerHTML = "📄 Loading...";

        const pageHtml = await fetchHtml(firstResult.href);
        const trid = extractTrid(pageHtml);

        if (!trid) {
            status.innerHTML = "⚠️ Video not found";
            searchBtn.disabled = false;
            return;
        }

        const finalUrl = `https://toonstream.dad/home/?trembed=0&trid=${trid}&trtype=2`;

        status.innerHTML = "✅ Opening video...";
        window.open(finalUrl, "_blank");

    } catch (e) {
        console.error(e);
        status.innerHTML = "❌ Error";
    }

    searchBtn.disabled = false;
});

animeInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") searchBtn.click();
});
</script>

</body>
</html>
