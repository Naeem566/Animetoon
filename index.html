<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeToon Finder</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 1rem; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #94a3b8; min-height: 20px; }
        iframe { margin-top: 1.5rem; width: 100%; height: 250px; border-radius: 12px; display: none; background: black; border: 1px solid #38bdf8; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AnimeToon Finder</h2>
        <input type="text" id="animeInput" placeholder="Enter Anime Name (e.g. Naruto)">
        <button id="searchBtn">Find Hindi Dub</button>
        <div id="status">Ready to search...</div>
        <iframe id="videoPlayer" src="" allowfullscreen scrolling="no"></iframe>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const status = document.getElementById('status');
        const videoPlayer = document.getElementById('videoPlayer');
        const animeInput = document.getElementById('animeInput');

        // আপনার লাইভ ক্লাউডফ্লেয়ার প্রক্সি লিঙ্ক (সঠিক ফরম্যাট)
        const MY_PROXY = "https://icy-union-41ef.mdiasen0182.workers.dev/?url="; 

        async function fetchHtml(url) {
            try {
                // লিঙ্কটি প্রক্সির মাধ্যমে পাঠানো হচ্ছে
                const response = await fetch(MY_PROXY + encodeURIComponent(url));
                if (!response.ok) throw new Error("Connection failed");
                return await response.text();
            } catch (err) {
                console.error(err);
                throw new Error("Proxy connection error.");
            }
        }

        searchBtn.addEventListener('click', async () => {
            const query = animeInput.value.trim();
            if (!query) return;

            status.innerHTML = "🔍 Searching ToonStream...";
            videoPlayer.style.display = "none";

            try {
                // ToonStream সাইটে সার্চ করা
                const searchUrl = `https://toonstream.dad/home/?s=${encodeURIComponent(query)}`;
                const searchHtml = await fetchHtml(searchUrl);
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(searchHtml, "text/html");
                const firstResult = doc.querySelector(".result-item a, article a, .post-title a");

                if (!firstResult) {
                    status.innerHTML = "❌ No results found.";
                    return;
                }

                const animePageLink = firstResult.href;
                status.innerHTML = "📄 Loading Video...";

                // এনিমে পেজ থেকে ভিডিওর আইডি খুঁজে বের করা
                const pageHtml = await fetchHtml(animePageLink);
                const tridMatch = pageHtml.match(/trid\s*[:=]\s*["']?(\d+)["']?/);

                if (tridMatch && tridMatch[1]) {
                    const trid = tridMatch[1];
                    // হিন্দি ডাব প্লেয়ারের লিঙ্ক জেনারেট করা
                    const finalEmbed = `https://toonstream.dad/home/?trembed=0&trid=${trid}&trtype=2`;
                    
                    status.innerHTML = "✅ Found! Playing now...";
                    videoPlayer.src = finalEmbed;
                    videoPlayer.style.display = "block";
                } else {
                    status.innerHTML = "⚠️ Video not found on this page.";
                }

            } catch (err) {
                status.innerHTML = "❌ Error connecting to server.";
            }
        });

        // Enter key সাপোর্ট
        animeInput.addEventListener("keypress", (e) => { if (e.key === "Enter") searchBtn.click(); });
    </script>
</body>
</html>
