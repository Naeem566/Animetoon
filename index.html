<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TRID Finder</title>
</head>

<body style="background:#0f172a;color:white;text-align:center;padding-top:50px">

<h2>Find ToonStream TRID</h2>

<input id="name" placeholder="naruto" style="padding:10px">
<button onclick="find()">Search</button>

<p id="out"></p>

<script>

const WORKER = "https://icy-union-41ef.mdiasen0182.workers.dev";

async function find() {

  const q = document.getElementById("name").value;
  const out = document.getElementById("out");

  if (!q) return;

  out.innerText = "Searching...";

  try {

    // 🔍 search page
    const res = await fetch(WORKER + "/?url=" + encodeURIComponent("https://toonstream.dad/home/?s=" + q));
    const html = await res.text();

    const doc = new DOMParser().parseFromString(html, "text/html");

    const link = doc.querySelector(".result-item a")?.href;

    if (!link) {
      out.innerText = "Not found";
      return;
    }

    // 📄 anime page
    const res2 = await fetch(WORKER + "/?url=" + encodeURIComponent(link));
    const html2 = await res2.text();

    const match = html2.match(/trid=(\d+)/);

    if (match) {
      out.innerText = "TRID = " + match[1];
    } else {
      out.innerText = "TRID not found";
    }

  } catch (e) {
    out.innerText = "Error";
  }
}

</script>

</body>
</html>
