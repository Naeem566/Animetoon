<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeToon | Hindi Dub Finder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 1.5rem; font-size: 1.5rem; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: white; margin-bottom: 1rem; box-sizing: border-box; outline: none; transition: border 0.3s; }
        input:focus { border-color: #2563eb; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.3s; }
        button:hover { background: #1d4ed8; }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #94a3b8; min-height: 20px; }
        iframe { margin-top: 1.5rem; width: 100%; height: 250px; border-radius: 12px; border: 1px solid #334155; display: none; background: black; }
        .success { color: #4ade80 !important; }
        .error { color: #f87171 !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AnimeToon Finder</h2>
        <input type="text" id="animeInput" placeholder="Enter Anime Name (e.g. Jujutsu Kaisen)">
        <button id="searchBtn">Find Hindi Dub</button>
        <div id="status">Ready to search...</div>
        <iframe id="videoPlayer" src="" allowfullscreen></iframe>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const status = document.getElementById('status');
        const videoPlayer = document.getElementById('videoPlayer');
        const animeInput = document.getElementById('animeInput');

        // Tomar personal Cloudflare Worker Proxy
        const MY_PROXY = "https://icy-union-41ef.mdiasen0182.workers.dev/?url="; 

        async function fetchHtml(url) {
            try {
                const response = await fetch(MY_PROXY + encodeURIComponent(url));
                if (!response.ok) throw new Error("Proxy connection failed.");
                return await response.text();
            } catch (err) {
                console.error(err);
                throw new Error("Proxy Error. Check your Cloudflare Worker.");
            }
        }

        searchBtn.addEventListener('click', async () => {
            const query = animeInput.value.trim();
            if (!query) return;

            status.innerHTML = "🔍 Searching ToonStream...";
            status.className = "";
            videoPlayer.style.display = "none";

            try {
                // Step 1: Search for the anime
                const searchUrl = `https://toonstream.dad/home/?s=${encodeURIComponent(query)}`;
                const searchHtml = await fetchHtml(searchUrl);
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(searchHtml, "text/html");
                const firstResult = doc.querySelector(".result-item a") || doc.querySelector("article a");

                if (!firstResult) {
                    status.innerHTML = "❌ No Hindi Dub found for this name.";
                    status.className = "error";
                    return;
                }

                const animePageLink = firstResult.href;
                status.innerHTML = "📄 Extracting Video Player...";

                // Step 2: Get TRID from the anime page
                const pageHtml = await fetchHtml(animePageLink);
                const tridMatch = pageHtml.match(/trid\s*:\s*["']?(\d+)["']?/);

                if (tridMatch && tridMatch[1]) {
                    const trid = tridMatch[1];
                    // trembed=3 is for Hindi player usually
                    const finalEmbed = `https://toonstream.dad/home/?trembed=3&trid=${trid}&trtype=3`;
                    
                    status.innerHTML = "✅ Video Loaded Successfully!";
                    status.className = "success";
                    videoPlayer.src = finalEmbed;
                    videoPlayer.style.display = "block";
                } else {
                    status.innerHTML = "⚠️ TRID not found. Opening search page...";
                    videoPlayer.src = searchUrl;
                    videoPlayer.style.display = "block";
                }

            } catch (err) {
                status.innerHTML = `❌ Error: ${err.message}`;
                status.className = "error";
            }
        });

        // "Enter" key press handle
        animeInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter") searchBtn.click();
        });
    </script>
</body>
</html>
