<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeToon Finder</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container {
    background: #1e293b;
    padding: 2rem;
    border-radius: 1.5rem;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid #334155;
}
h2 { color: #38bdf8; margin-bottom: 1.5rem; }

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    margin-bottom: 1rem;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover { background: #1d4ed8; }

#status {
    margin-top: 1rem;
    font-size: 0.9rem;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">
    <h2>AnimeToon Finder</h2>
    <input type="text" id="animeInput" placeholder="Enter Anime Name (e.g. Naruto)">
    <button id="searchBtn">Find Hindi Dub</button>
    <div id="status">Ready to search...</div>
</div>

<script>
const searchBtn = document.getElementById('searchBtn');
const status = document.getElementById('status');
const animeInput = document.getElementById('animeInput');

// 🔥 YOUR PROXY
const MY_PROXY = "https://icy-union-41ef.mdiasen0182.workers.dev/?url=";

// fetch function
async function fetchHtml(url) {
    const res = await fetch(MY_PROXY + encodeURIComponent(url));
    if (!res.ok) throw new Error("Proxy error");
    return await res.text();
}

// 🔍 extract trid safely
function extractTrid(html) {
    let match =
        html.match(/trid=(\d+)/) ||
        html.match(/trid["']?\s*[:=]\s*["']?(\d+)/) ||
        html.match(/data-trid=["'](\d+)/);

    return match ? match[1] : null;
}

searchBtn.addEventListener('click', async () => {

    const query = animeInput.value.trim();
    if (!query) return;

    status.innerHTML = "🔍 Searching...";
    searchBtn.disabled = true;

    try {

        // 🔍 search page
        const searchUrl = `https://toonstream.dad/home/?s=${encodeURIComponent(query)}`;
        const searchHtml = await fetchHtml(searchUrl);

        const parser = new DOMParser();
        const doc = parser.parseFromString(searchHtml, "text/html");

        const firstResult =
            doc.querySelector(".result-item a") ||
            doc.querySelector("article a") ||
            doc.querySelector(".post-title a");

        if (!firstResult) {
            status.innerHTML = "❌ No results found";
            searchBtn.disabled = false;
            return;
        }

        const animePage = firstResult.href;

        status.innerHTML = "📄 Loading anime page...";

        // 📄 open page
        const pageHtml = await fetchHtml(animePage);

        const trid = extractTrid(pageHtml);

        if (!trid) {
            status.innerHTML = "⚠️ Could not find video ID";
            searchBtn.disabled = false;
            return;
        }

        // 🎬 final link
        const finalUrl = `https://toonstream.dad/home/?trembed=0&trid=${trid}&trtype=2`;

        status.innerHTML = "✅ Opening video...";

        // ❗ iframe bad, direct open
        window.open(finalUrl, "_blank");

    } catch (err) {
        console.error(err);
        status.innerHTML = "❌ Failed to fetch data";
    }

    searchBtn.disabled = false;
});

// enter key support
animeInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") searchBtn.click();
});
</script>

</body>
</html>
